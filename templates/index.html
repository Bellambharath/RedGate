<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GenAI Row Count Validator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="app-bg">
    <div class="container card">

      <h1>GenAI Row Count Validator</h1>

      <div class="form-grid">
        <div class="form-group">
          <label for="sourceDb">Source DB</label>
          <select id="sourceDb">
            <option value="">Select Source DB</option>
          </select>
        </div>

        <div class="form-group">
          <label for="targetDb">Target DB</label>
          <select id="targetDb">
            <option value="">Select Target DB</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sourceTable">Source Table</label>
          <select id="sourceTable" disabled>
            <option value="">Select Source Table</option>
          </select>
        </div>

        <div class="form-group">
          <label for="targetTable">Target Table</label>
          <select id="targetTable" disabled>
            <option value="">Select Target Table</option>
          </select>
        </div>
      </div>

      <label for="prompt">Validation Question</label>
      <textarea id="prompt" rows="4"
        placeholder="e.g. Compare rows where OrderDate >= '2014-01-01'">
      </textarea>

      <button id="submitBtn" class="primary-btn">Validate Row Counts</button>

      <div id="resultSection">
        <div id="resultPlaceholder" class="muted">Results will appear here.</div>
        <div id="resultContent"></div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
